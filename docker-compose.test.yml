services:
  postgres:
    image: postgres:17-alpine
    container_name: flowguard-test-postgres
    environment:
      POSTGRES_USER: flowguard
      POSTGRES_PASSWORD: flowguard
      POSTGRES_DB: flowguard_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowguard -d flowguard_test"]
      interval: 1s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flowguard-test-redis
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 20
    tmpfs:
      - /data
